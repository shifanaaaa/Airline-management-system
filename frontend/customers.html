<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers – Bermuda</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { background: linear-gradient(to top, #a1c4fd, #c2e9fb); min-height:100vh; padding: 30px; }

    .container {
        max-width: 1000px;
        margin: auto;
    }

    h2 {
        color: #1e90ff;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2rem;
    }

    .customer-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .customer-card {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .customer-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }

    .customer-card h3 {
        color: #1e90ff;
        margin-bottom: 10px;
        font-size: 1.3rem;
    }

    .customer-card p {
        margin-bottom: 6px;
        font-size: 0.95rem;
        color: #333;
    }

    .back {
        display: inline-block;
        margin-top: 30px;
        padding: 12px 25px;
        border-radius: 8px;
        background: #1e90ff;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .back:hover { background: #0066cc; }

    @media (max-width: 500px) {
        h2 { font-size: 1.6rem; }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Registered Customers</h2>
    <div class="customer-grid">
        {% for customer in customers %}
        <div class="customer-card">
            <h3>{{ customer.name }}</h3>
            <p><strong>ID:</strong> {{ customer.customer_id }}</p>
            <p><strong>Email:</strong> {{ customer.email }}</p>
            <p><strong>Phone:</strong> {{ customer.phone or 'N/A' }}</p>
            <p><strong>Address:</strong> {{ customer.address or 'N/A' }}</p>
        </div>
        {% endfor %}
    </div>
    <a href="/admin_dashboard" class="back">Back to Dashboard</a>
</div>

</body>
</html>
