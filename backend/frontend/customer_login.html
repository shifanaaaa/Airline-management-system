<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login – Bermuda</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { background: linear-gradient(to top, #a1c4fd, #c2e9fb); display:flex; justify-content:center; align-items:center; height:100vh; }

    .login-container {
        background: #fff;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .login-container h2 {
        color: #1e90ff;
        margin-bottom: 25px;
        font-size: 2rem;
    }

    .login-container input {
        width: 100%;
        padding: 12px 15px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
    }

    .login-container button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #1e90ff;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .login-container button:hover {
        background: #0066cc;
    }

    .login-container .register-link {
        margin-top: 15px;
        display: block;
        color: #1e90ff;
        text-decoration: none;
        font-size: 0.95rem;
    }

    .login-container .register-link:hover {
        text-decoration: underline;
    }

    .error-msg {
        color: red;
        margin-bottom: 10px;
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<div class="login-container">
    <h2>Customer Login</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error-msg">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST" action="/customer_login">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <a href="/register" class="register-link">Don't have an account? Register</a>
</div>

</body>
</html>
